services:
  zed-ros2:
    image: zed_ros2_l4t_36.4.0_sdk_5.1.0:latest
    runtime: nvidia
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    shm_size: "2gb"
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=2
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - /dev:/dev
      - /usr/local/zed/resources/:/usr/local/zed/resources/
      - /usr/local/zed/settings/:/usr/local/zed/settings/
      - ../config:/root/ros2_ws/config
      - ../models:/root/ros2_ws/models
    command: >
      bash -lc "
        source /root/ros2_ws/install/setup.bash && 
        export ROS_DOMAIN_ID=2 &&
        ros2 launch zed_wrapper zed_camera.launch.py camera_model:=zed2i ros_params_override_path:=/root/ros2_ws/config/zenith_stereo.yaml publish_tf:=false publish_map_tf:=false
        "

