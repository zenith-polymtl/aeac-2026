<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super page de Zenith</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="shortcut icon" href="/images/favicon.ico">
</head>
<body>
    <div class="main-container">
        <div class="left-container">
            <div class="top-container">
                <div class="mission-status-info-container">
                    <span id="mission-status-span">Mission Status: IDDLE</span>
                    <span id="connection-span">Drone Connection: Conneted</span>
                    <span id="zed-connection-span">Zed Connection: Conneted</span>
                </div>
                <div class="mission-progresson-info-container">
                    <span id="time-to-reach-site-span">Time to reach site: XX:XX</span>
                    <span id="target-shot-span">Target Shot: X</span>
                </div>
                <div class="zenith-logo-container">
                    <img src="/images/LOGO.png" alt="logo" id="logo-image">
                    <h2>Zenith Mission 2 Control Page</h2>
                </div>
            </div>
            <div class="middle-top-container">
                <div class="button-container">
                    <h3>Buttons</h3>
                    <div class="buttons-grid">
                        <button id="start-button">Start</button>
                        <button id="go-to-site-button">Go To Site</button>
                        <button id="auto-approach-button">Auto Approach</button>
                        <button id="auto-shoot-button">Auto Aim</button>
                        <button id="shoot-button">Shoot</button>
                        <button id="take-picture-button">Take Picture</button>
                        <button id="abort-button">Abort</button>
                    </div>
                </div>
                <div class="image-display-container">
                    <h3 id="no-picture-received" class="no-picture-received">No Picture Received Yet</h3>
                    <img id="target-image" class="target-image" style="display: none;">
                </div>
            </div>
            <div class="middle-bottom-container">
                <div class="toggle-gimbal-control-container">
                    <div class="gimbal-mode-row">
                        <span>Gimbal Mode</span>
                        <div class="mode-btn-group">
                            <button type="button" id="btn-follow" class="mode-btn active">Follow</button>
                            <button type="button" id="btn-lock" class="mode-btn">Lock</button>
                        </div>
                    </div>
                    <div class="orientation-display">
                        <div class="orient-item">
                            <span class="orient-label">Mode</span>
                            <span class="orient-value" id="gimbal-mode-val" style="font-size: 0.78rem; color: var(--text-primary);">—</span>
                        </div>
                        <div class="orient-item">
                            <span class="orient-label">Pitch</span>
                            <span class="orient-value"><span id="pitch-val">—</span>°</span>
                        </div>
                        <div class="orient-item">
                            <span class="orient-label">Yaw</span>
                            <span class="orient-value"><span id="yaw-val">—</span>°</span>
                        </div>
                    </div>
                </div>

                <div class="confirm-deny-container">
                    <button id="accept-image-button" class="accept-image-button disabled">Accept</button>
                    <button id="deny-image-deny" class="deny-image-button disabled">Deny</button>
                </div>
            </div>
            <div class="bottom-container">
                <div class="aim-offset-container">
                    <div class="offset-pad-wrap">
                        <span class="offset-pad-label">Offset pad</span>
                        <div id="offset-pad">
                            <div class="pad-axis-line pad-axis-h"></div>
                            <div class="pad-axis-line pad-axis-v"></div>
                            <div id="pad-dot"></div>
                        </div>
                    </div>
                    <div class="offset-sliders-wrap">
                        <div class="offset-axis-row">
                            <span class="offset-axis-label">X</span>
                            <input type="range" id="x-slider" step="1" value="0">
                            <input type="number" id="x-num" class="offset-num" step="1" value="0">
                        </div>
                        <div class="offset-axis-row">
                            <span class="offset-axis-label">Y</span>
                            <input type="range" id="y-slider" value="0">
                            <input type="number" id="y-num" class="offset-num" step="1" value="0">
                        </div>
                    </div>
                    <div class="offset-actions">
                        <button id="apply-offset-button">Apply</button>
                        <button id="reset-offset-button">Reset</button>
                    </div>
                </div>         
            </div>
        </div>
        <div class="logs-container"></div>
    </div>
    <script src="/js/script.js"></script>
</body>
</html>
